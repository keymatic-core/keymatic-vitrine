<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="brand-grad" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Key body (rounded rectangle) -->
  <rect x="2" y="8" width="14" height="16" rx="4" fill="url(#brand-grad)"/>
  <!-- Key hole (circle cutout illusion) -->
  <circle cx="9" cy="16" r="3" fill="#09090b" opacity="0.3"/>
  <circle cx="9" cy="16" r="1.5" fill="white" opacity="0.9"/>
  <!-- Key teeth (digital style) -->
  <rect x="16" y="12" width="6" height="3" rx="1" fill="url(#brand-grad)"/>
  <rect x="16" y="17" width="10" height="3" rx="1" fill="url(#brand-grad)"/>
  <rect x="22" y="12" width="4" height="3" rx="1" fill="url(#brand-grad)" opacity="0.7"/>
  <!-- Spark dot -->
  <circle cx="28" cy="13.5" r="2" fill="#a855f7" opacity="0.8"/>
  <circle cx="28" cy="13.5" r="1" fill="white"/>
</svg>
