<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="tg" x1="40" y1="8" x2="160" y2="24" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f97316"/>
      <stop offset="50%" stop-color="#ec4899"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Icon: Key body -->
  <rect x="2" y="8" width="14" height="16" rx="4" fill="url(#bg)"/>
  <circle cx="9" cy="16" r="3" fill="#09090b" opacity="0.3"/>
  <circle cx="9" cy="16" r="1.5" fill="white" opacity="0.9"/>
  <!-- Key teeth -->
  <rect x="16" y="12" width="6" height="3" rx="1" fill="url(#bg)"/>
  <rect x="16" y="17" width="10" height="3" rx="1" fill="url(#bg)"/>
  <rect x="22" y="12" width="4" height="3" rx="1" fill="url(#bg)" opacity="0.7"/>
  <!-- Spark -->
  <circle cx="28" cy="13.5" r="2" fill="#a855f7" opacity="0.8"/>
  <circle cx="28" cy="13.5" r="1" fill="white"/>
  <!-- Text: Keymatic -->
  <text x="36" y="22" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="600" letter-spacing="-0.3" fill="currentColor">Keymatic</text>
</svg>
